services:
  postgres:
    image: postgres:16-alpine
    container_name: pokedex-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pokedex}
      POSTGRES_USER: ${POSTGRES_USER:-pokedex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pokedex_dev}
    volumes:
      - pokedex_pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pokedex} -d ${POSTGRES_DB:-pokedex}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: pokedex-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pokedex_pg_data:
